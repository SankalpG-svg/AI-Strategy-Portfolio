<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Strategy Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #ffffff;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            max-width: 800px;
            width: 95%;
        }

        h1 { margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }
        .subtitle { color: #aaa; margin-bottom: 30px; font-size: 0.9em; }

        /* Menu Styles */
        .menu-buttons { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn-large {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            border: 1px solid #00f2fe;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-large:hover { background: #00f2fe; color: #0f2027; box-shadow: 0 0 20px #00f2fe; transform: translateY(-3px); }

        /* Game Controls */
        .controls { margin-bottom: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        select, button {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px; border-radius: 10px; font-family: 'Poppins', sans-serif; cursor: pointer; transition: 0.3s;
        }
        select option { background: #203a43; color: white; }
        select:hover, button:hover { background: rgba(255, 255, 255, 0.2); }
        .back-btn { background: rgba(254, 9, 121, 0.1); border-color: #fe0979; color: #fe0979; }
        .back-btn:hover { background: #fe0979; color: white; box-shadow: 0 0 15px #fe0979; }

        /* Boards */
        .board-ttt { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 15px; justify-content: center; }
        .board-c4 { display: grid; grid-template-columns: repeat(7, 60px); grid-template-rows: repeat(6, 60px); gap: 8px; justify-content: center; background: rgba(0, 100, 255, 0.1); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }

        .cell { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .cell-ttt { width: 100px; height: 100px; border-radius: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .cell-c4 { width: 60px; height: 60px; border-radius: 50%; background: rgba(0, 0, 0, 0.4); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .cell:hover { background: rgba(255, 255, 255, 0.1); }

        /* Tokens */
        .token { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .token-ttt-p { width: 60%; height: 60%; background: #00f2fe; border-radius: 12px; box-shadow: 0 0 20px #00f2fe; }
        .token-ttt-a { width: 65%; height: 65%; background: #fe0979; border-radius: 50%; box-shadow: 0 0 20px #fe0979; }
        .token-c4 { width: 90%; height: 90%; border-radius: 50%; animation: dropIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; position: absolute; }
        .token-c4-p { background: #00f2fe; box-shadow: 0 0 15px #00f2fe; }
        .token-c4-a { background: #fe0979; box-shadow: 0 0 15px #fe0979; }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes dropIn { 0% { transform: translateY(-300px); opacity: 0.5; } 100% { transform: translateY(0); opacity: 1; } }

        .status { margin-top: 25px; font-size: 1.2em; font-weight: 600; min-height: 30px; }
        .hidden { display: none !important; }
        .btn-subtitle { font-size: 0.8em; font-weight: 400; color: #fff; }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div id="view-menu">
            <h1>AI Strategy Portfolio</h1>
            <p class="subtitle">Select an algorithm engine to challenge.</p>
            <div class="menu-buttons">
                <button class="btn-large" onclick="showView('ttt')">Tic-Tac-Toe<br><span class="btn-subtitle">Minimax vs Custom Heuristic</span></button>
                <button class="btn-large" onclick="showView('c4')">Connect Four<br><span class="btn-subtitle">Alpha-Beta Pruning</span></button>
            </div>
        </div>

        <div id="view-ttt" class="hidden">
            <h1>Algorithm Duel: Tic-Tac-Toe</h1>
            <div class="controls">
                <button class="back-btn" onclick="showView('menu')">← Back</button>
                <select id="strategy-ttt">
                    <option value="minimax">Unbeatable (Minimax Engine)</option>
                    <option value="sankalp_2">Custom Heuristic AI</option>
                    <option value="random">Random Mover</option>
                </select>
                <button onclick="resetTTT()">Restart Game</button>
            </div>
            <div class="board-ttt" id="board-ttt"></div>
            <div class="status" id="status-ttt">Your Turn (Cyan)</div>
        </div>

        <div id="view-c4" class="hidden">
            <h1>Algorithm Duel: Connect Four</h1>
            <div class="controls">
                <button class="back-btn" onclick="showView('menu')">← Back</button>
                <select id="strategy-c4">
                    <option value="alphabeta">Unbeatable (Alpha-Beta Pruning)</option>
                    <option value="minimax">Standard Minimax</option>
                    <option value="random">Random Mover</option>
                </select>
                <button onclick="resetC4()">Restart Game</button>
            </div>
            <div class="board-c4" id="board-c4"></div>
            <div class="status" id="status-c4">Your Turn (Drop a token)</div>
        </div>

    </div>

    <script>
        // GLOBAL STATE
        const playerLetter = 'X';
        const aiLetter = 'O';

        // --- NAVIGATION ---
        function showView(viewName) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-ttt').classList.add('hidden');
            document.getElementById('view-c4').classList.add('hidden');
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            if(viewName === 'ttt') resetTTT();
            if(viewName === 'c4') resetC4();
        }

        // --- TIC TAC TOE LOGIC ---
        let tttBoard = Array(9).fill(' ');
        let tttGameOver = false;

        function initTTT() {
            const container = document.getElementById('board-ttt');
            container.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell cell-ttt';
                cell.onclick = () => makeTTTMove(i);
                container.appendChild(cell);
            }
        }

        function updateTTTUI() {
            const cells = document.querySelectorAll('.cell-ttt');
            for (let i = 0; i < 9; i++) {
                cells[i].innerHTML = ''; 
                if (tttBoard[i] === playerLetter) {
                    cells[i].innerHTML = '<div class="token token-ttt-p"></div>';
                } else if (tttBoard[i] === aiLetter) {
                    cells[i].innerHTML = '<div class="token token-ttt-a"></div>';
                }
            }
        }

        function checkTTTWin(b, letter) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(c => b[c[0]] === letter && b[c[1]] === letter && b[c[2]] === letter);
        }

        async function makeTTTMove(index) {
            if (tttBoard[index] !== ' ' || tttGameOver) return;
            tttBoard[index] = playerLetter;
            updateTTTUI();
            
            const status = document.getElementById('status-ttt');
            if (checkTTTWin(tttBoard, playerLetter)) { status.innerText = "You Win!"; status.style.color = "#00f2fe"; tttGameOver = true; return; }
            if (!tttBoard.includes(' ')) { status.innerText = "Draw!"; tttGameOver = true; return; }

            status.innerText = "AI is computing..."; status.style.color = "#fff";
            await getTTTAIMove();
        }

        async function getTTTAIMove() {
            const strategy = document.getElementById('strategy-ttt').value;
            const status = document.getElementById('status-ttt');
            try {
                const res = await fetch('https://your-railway-url.app/get_ttt_move', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ board: tttBoard, ai_letter: aiLetter, strategy: strategy })
                });
                const data = await res.json();
                tttBoard[data.move] = aiLetter;
                updateTTTUI();

                if (checkTTTWin(tttBoard, aiLetter)) { status.innerText = "AI Wins."; status.style.color = "#fe0979"; tttGameOver = true; return; }
                if (!tttBoard.includes(' ')) { status.innerText = "Draw!"; tttGameOver = true; return; }
                status.innerText = "Your Turn (Cyan)";
            } catch (e) { status.innerText = "Backend Error."; status.style.color = "red"; }
        }

        function resetTTT() {
            tttBoard = Array(9).fill(' ');
            tttGameOver = false;
            document.getElementById('status-ttt').innerText = "Your Turn (Cyan)";
            document.getElementById('status-ttt').style.color = "#fff";
            initTTT();
        }

        // --- CONNECT FOUR LOGIC ---
        let c4Board = Array(6).fill().map(() => Array(7).fill(' '));
        let c4GameOver = false;

        function initC4() {
            const container = document.getElementById('board-c4');
            container.innerHTML = '';
            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 7; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell cell-c4';
                    cell.id = `c4-${r}-${c}`;
                    cell.onclick = () => makeC4Move(c);
                    container.appendChild(cell);
                }
            }
        }

        function getC4Row(col) {
            for (let r = 5; r >= 0; r--) { if (c4Board[r][col] === ' ') return r; }
            return -1;
        }

        function renderC4Token(row, col, letter) {
            const cell = document.getElementById(`c4-${row}-${col}`);
            const token = document.createElement('div');
            token.className = `token-c4 ${letter === playerLetter ? 'token-c4-p' : 'token-c4-a'}`;
            cell.appendChild(token);
        }

        function checkC4Win(b, l) {
            for(let r=0; r<6; r++) for(let c=0; c<4; c++) if(b[r][c]===l && b[r][c+1]===l && b[r][c+2]===l && b[r][c+3]===l) return true;
            for(let r=0; r<3; r++) for(let c=0; c<7; c++) if(b[r][c]===l && b[r+1][c]===l && b[r+2][c]===l && b[r+3][c]===l) return true;
            for(let r=3; r<6; r++) for(let c=0; c<4; c++) if(b[r][c]===l && b[r-1][c+1]===l && b[r-2][c+2]===l && b[r-3][c+3]===l) return true;
            for(let r=0; r<3; r++) for(let c=0; c<4; c++) if(b[r][c]===l && b[r+1][c+1]===l && b[r+2][c+2]===l && b[r+3][c+3]===l) return true;
            return false;
        }

        async function makeC4Move(col) {
            if (c4GameOver) return;
            let row = getC4Row(col);
            if (row === -1) return; 
            
            c4Board[row][col] = playerLetter;
            renderC4Token(row, col, playerLetter);
            
            const status = document.getElementById('status-c4');
            if (checkC4Win(c4Board, playerLetter)) { status.innerText = "You Win!"; status.style.color = "#00f2fe"; c4GameOver = true; return; }
            if (c4Board[0].every(c => c !== ' ')) { status.innerText = "Draw!"; c4GameOver = true; return; }

            status.innerText = "AI Engine is computing..."; status.style.color = "#fff";
            await getC4AIMove();
        }

        async function getC4AIMove() {
            const strategy = document.getElementById('strategy-c4').value;
            const status = document.getElementById('status-c4');
            try {
                const res = await fetch('https://your-railway-url.app/get_c4_move', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ board: c4Board, ai_letter: aiLetter, strategy: strategy })
                });
                const data = await res.json();
                let aiCol = data.move;
                let aiRow = getC4Row(aiCol);
                
                c4Board[aiRow][aiCol] = aiLetter;
                renderC4Token(aiRow, aiCol, aiLetter);

                if (checkC4Win(c4Board, aiLetter)) { status.innerText = "AI Wins."; status.style.color = "#fe0979"; c4GameOver = true; return; }
                if (c4Board[0].every(c => c !== ' ')) { status.innerText = "Draw!"; c4GameOver = true; return; }
                status.innerText = "Your Turn (Drop a token)";
            } catch (e) { status.innerText = "Backend Error."; status.style.color = "red"; }
        }

        function resetC4() {
            c4Board = Array(6).fill().map(() => Array(7).fill(' '));
            c4GameOver = false;
            document.getElementById('status-c4').innerText = "Your Turn (Drop a token)";
            document.getElementById('status-c4').style.color = "#fff";
            initC4();
        }

        // Initialize empty boards in background
        initTTT();
        initC4();
    </script>
</body>
</html>
